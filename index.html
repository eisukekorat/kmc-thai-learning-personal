<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイ語学習アプリ</title>
<meta name="theme-color" content="#0a0e14">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e14;
    color: #e4e2da;
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    padding: 20px;
  }
  .logo { font-size: 3.5rem; }
  .message {
    font-size: 1.15rem;
    color: #d4b87a;
    letter-spacing: 0.06em;
    text-align: center;
  }
  .spinner {
    width: 34px;
    height: 34px;
    border: 3px solid #262c38;
    border-top-color: #b8956e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sub {
    font-size: 0.8rem;
    color: #6e6e7e;
  }
</style>
</head>
<body>
<div class="logo">🇹🇭</div>
<div class="message">タイ語学習アプリを起動中...</div>
<div class="spinner"></div>
<div class="sub">少々お待ちください</div>
<script>
  setTimeout(function() {
    window.location.href = 'advanced.html';
  }, 2000);
</script>
</body>
</html>
